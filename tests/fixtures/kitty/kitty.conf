# Kitty config de ejemplo para tests.
# Mezcla casos: fg/bg, los 16 ANSI completos, selection, cursor.

# Includes pueden aparecer en cualquier lado; nuestro backend no los expande.
include themes/base.conf

font_family JetBrains Mono
font_size 12.0

# Colores principales.
foreground #cdd6f4
background #1e1e2e

# 8 normales.
color0 #1e1e2e
color1 #f38ba8
color2 #a6e3a1
color3 #f9e2af
color4 #89b4fa
color5 #f5c2e7
color6 #94e2d5
color7 #cdd6f4

# 8 bright.
color8 #6c7086
color9 #f38ba8
color10 #a6e3a1
color11 #f9e2af
color12 #89b4fa
color13 #f5c2e7
color14 #94e2d5
color15 #a6adc8

# Selection y cursor.
selection_foreground #1e1e2e
selection_background #f5e0dc
cursor #f5e0dc
cursor_text_color #1e1e2e

# Otra opcion no-color que el roundtrip debe preservar.
enable_audio_bell no
